<!DOCTYPE html>
<html lang="en">

<head>
  <title>Hatchibombotar</title>
  <!-- add icon link -->
  <link rel="icon" href="../images/logo_no_border.png" type="image/x-icon">


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @font-face {
      font-family: 'BebasNeue-Regular';
      src: url('../fonts/BebasNeue-Regular.eot');
      src: url('../fonts/BebasNeue-Regular.eot?#iefix') format('embedded-opentype'),
        url('../fonts/BebasNeue-Regular.svg#BebasNeue-Regular') format('svg'),
        url('../fonts/BebasNeue-Regular.ttf') format('truetype'),
        url('../fonts/BebasNeue-Regular.woff') format('woff'),
        url('../fonts/BebasNeue-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: BebasNeue-Regular;
      margin: 0;
      background: #d8d8d8;
    }

    /* Style the header */
    .header {
      padding: 1px;
      background: #f5f5f5;
      text-align: center;
      color: white;
    }

    /* Increase the font size of the h1 element */
    .header h1 {
      font-size: 0px;
    }


    /* Ensure proper sizing */
    * {
      box-sizing: border-box;
    }

    /* Main column */
    .main {
      background-color: #e4e4e4;
      /* White background color */
      padding: 30px;
      /* Some padding */
      font-size: 20px;
      text-align: center;
    }


    .footer {
      padding: 20px;
      /* Some padding */
      text-align: center;
      /* Center text*/
      background: #d8d8d8;
      /* Grey background */
    }


    .icon {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 10px;
      margin-right: 10px;
      margin-left: 10px;
    }

    @media screen and (max-width: 600px) {
      .main {
        text-align: center;
      }

      .image {
        float: center;
      }
    }

    @media screen and (max-width: 400px) {
      .navbar a {
        float: none;
        width: 100%;
      }

      .sidea {
        display: none;
      }

      .sideb {
        display: none;
      }

      .large_image {
        display: none;
      }
    }

    @media screen and (min-width: 400px) {
      .small_image {
        display: none;
      }
    }

    @media screen and (max-width: 800px) {
      .row {
        display: inline;
      }
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

</head>

<body>
  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WGWFVNC"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div class="header">
    <div id="center">

      <a href="https://hatchibombotar.github.io/">
        <img class="bannerImg" src="../images/logo_no_border.png" alt="Website Banner" width="80">
      </a>
      <p>
      <p class="headerText" style="font-family: BebasNeue-Regular; color:#f88400; font-size: 25px;">
        hatchibombotar
      </p>
    </div>
  </div>

  <div class="main">
    <img id="pack_icon" class="icon" src="../images/resized_pack_icons/climbable_chains.png" alt="climbable chains addon" width="150" height="150">
    <script src=./js/redirects.js></script>
    <br>
    <span id="timer">
      <script type="text/javascript">countDown();
      </script>
    </span>
  </div>



  <div class="footer">
    <h2></h2>
  </div>
</body>

</html>
