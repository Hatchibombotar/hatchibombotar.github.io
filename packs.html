<!DOCTYPE html>
<html lang="en">

<head>
  <title>Hatchibombotar</title>
  <!-- add icon link -->
  <link rel="icon" href="https://www.hatchibombotar.com/images/logo_no_border.png" type="image/x-icon">


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @font-face {
      font-family: 'BebasNeue-Regular';
      src: url('https://www.hatchibombotar.com/fonts/BebasNeue-Regular.eot');
      src: url('https://www.hatchibombotar.com/fonts/BebasNeue-Regular.eot?#iefix') format('embedded-opentype'),
        url('https://www.hatchibombotar.com/fonts/BebasNeue-Regular.svg#BebasNeue-Regular') format('svg'),
        url('https://www.hatchibombotar.com/fonts/BebasNeue-Regular.ttf') format('truetype'),
        url('https://www.hatchibombotar.com/fonts/BebasNeue-Regular.woff') format('woff'),
        url('https://www.hatchibombotar.com/fonts/BebasNeue-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: BebasNeue-Regular;
      margin: 0;
    }

    /* Style the header */
    .header {
      padding: 8px;
      text-align: center;
      background: #f5f5f5;
      color: white;
    }

    /* Increase the font size of the h1 element */
    .header h1 {
      font-size: 90px;
    }

    /* Style the top navigation bar */
    .navbar {
      overflow: hidden;
      background-color: #e9e9e9;
    }

    /* Style the navigation bar links */
    .navbar a {
      float: left;
      display: block;
      color: black;
      text-align: center;
      padding: 5px 20px;
      text-decoration: none;
    }

    /* Right-aligned link */
    .navbar a.right {
      float: right;
    }

    /* Change color on hover */
    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Ensure proper sizing */
    * {
      box-sizing: border-box;
    }

    /* Main column */
    .main {
      background-color: #e4e4e4;
      /* White background color */
      padding: 30px;
      /* Some padding */
      font-size: 20px;
      flex: 80%;
    }

    /* Column container */
    .row {
      display: flex;
      flex-wrap: wrap;
    }

    .main>div {
      background-color: #e4e4e4;
      /* White background color */
      padding: 40px;
      /* Some padding */
    }

    .footer {
      padding: 20px;
      /* Some padding */
      text-align: center;
      /* Center text*/
      background: #d8d8d8;
      /* Grey background */
    }

    .sidea {
      flex: 10%;
      background-color: #d8d8d8;
    }

    .sideb {
      flex: 10%;
      background-color: #d8d8d8;
    }

    .image,
    main p {
      text-align: center;
    }
    .icon {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 10px;
      margin-right: 10px;
      margin-left: 10px;
    }

    /* Puts the text to the right */
    @media screen and (min-width: 600px) {
      .main {
        display: flex;
      }
    }

    /* Responsive layout - when the screen is less than 400px wide, make the navigation links stack on top of each other instead of next to each other */
    @media screen and (max-width: 600px) {
      .main {
        text-align: center;
      }

      .image {
        float: center;
      }
    }

    /* Responsive layout - when the screen is less than 400px wide, make the navigation links stack on top of each other instead of next to each other */
    @media screen and (max-width: 400px) {
      .navbar a {
        float: none;
        width: 100%;
      }

      .sidea {
        display: none;
      }

      .sideb {
        display: none;
      }
    }

    /* Responsive layout - when the screen is less than 400px wide, make the navigation links stack on top of each other instead of next to each other */
    @media screen and (max-width: 800px) {

      .row {
        display: inline;
      }
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>

  <div class="header">
    <div id="center">

      <a href="https://hatchibombotar.com">
        <img class="bannerImg" src="https://www.hatchibombotar.com/images/logo.png" alt="Website Banner" width="150" height="150">
      </a>
      <p style="font-family: BebasNeue-Regular; color:#f88400; font-size: 40px;">
        hatchibombotar
      </p>
    </div>
  </div>

  <div class="navbar">
    <a href="https:mcpedl.com/user/hatchibombotar/">MCPEDL Page</a>
    <a href="#">Discord</a>
    <a href="#"></a>
    <a href="https://hatchibombotar.com/packs" class="right">Downloads</a>
  </div>
  <div class="row">
    <div class="sidea"></div>
    <div class="main">
      <a href="https://hatchibombotar.github.io/packs/graves_addon.html">
        <img class="icon" src="https://www.hatchibombotar.com/images/resized_pack_icons/graves.png" alt="graves addon" width="150" height="150">
      </a>
      <a href="https://hatchibombotar.github.io/packs/chains_addon.html">
        <img class="icon" src="https://www.hatchibombotar.com/images/resized_pack_icons/climbable_chains.png" alt="chains addon" width="150" height="150">
      </a>
      <a href="https://hatchibombotar.github.io/packs/player_sit_addon.html">
        <img class="icon" src="https://www.hatchibombotar.com/images/resized_pack_icons/player_sit.png" alt="player sit addon" width="150" height="150">
      </a>
    </div>
    <div class="sideb"></div>
  </div>


  <div class="footer">
    <h2>Hatchibombotar 2020</h2>
  </div>
</body>

</html>
